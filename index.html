<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nestly-Parental-Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="header-left">
        <img src="assets/logo.png" alt="Nestly Logo" class="logo" />
        <span class="logo-text">Nestly</span>
      </div>

      <div class="header-center">
        <p class="slogan">Digital Nest for Growth.</p>
      </div>

      <div class="header-right">
        <button class="add-btn">Add Child</button>
        <button class="list-btn">Child List</button>
      </div>
    </header>

    <!-- Child Cards Container -->
    <div id="child-list"></div>

    <!-- Dashboard -->
    <main id="dashboard">
      <section class="card child-profile" id="child-profile">
        <div class="card-content">
          <h3>Child Profile</h3>
          <p class="child-name">Name: -</p>
          <p class="child-birth">Birth Date: -</p>
          <p class="child-height">Height: -</p>
          <p class="child-weight">Weight: -</p>
          <p class="child-gender">Gender: -</p>
        </div>
      </section>

      <section class="card growth-chart" id="growth-chart">
        <h3>Growth Over Time</h3>
      </section>

      <section class="card record-form" id="record-form">
        <h3>Add New Record</h3>

        <form id="growth-record-form">
          <label for="record-date">Date</label>
          <input type="date" id="record-date" required />

          <label for="height-ft">Height (ft / in)</label>
          <div class="height-input-group">
            <input
              type="number"
              id="height-ft"
              placeholder="ft"
              min="0"
              required
            />
            <input
              type="number"
              id="height-in"
              placeholder="in"
              min="0"
              required
            />
          </div>

          <label for="record-weight">Weight (lbs)</label>
          <input
            type="number"
            id="record-weight"
            step="0.1"
            min="0"
            placeholder="e.g. 35.0"
            required
          />
          <button type="submit" class="save-record-btn">+ Add Record</button>
        </form>
      </section>

      <section class="card records-list" id="records-list">
        <h3>Growth Records</h3>
        <div id="records-container"></div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
