<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nestly-Parental-Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="header-left">
        <img src="assets/nestly-logo.png" alt="Nestly Logo" class="logo" />
      </div>

      <div class="header-center">
        <p class="slogan">Digital Nest for Growth.</p>
      </div>

      <div class="header-right">
        <button class="add-btn">Add Child</button>
        <button class="list-btn">Child List</button>
      </div>
    </header>

    <!-- Child Cards Container -->
    <div id="child-list"></div>

    <!-- Dashboard -->
    <main id="dashboard">
      <section class="card" id="childProfile">
        <div class="card-content">
          <h3>Child Profile</h3>
          <p class="child-name">Name: -</p>
          <p class="child-birth">Birth Date: -</p>
          <p class="child-height">Height: -</p>
          <p class="child-weight">Weight: -</p>
          <p class="child-gender">Gender: -</p>
        </div>
      </section>

      <section class="growth-chart" id="growth-chart">
        <h3>Growth Chart</h3>
      </section>
      <section class="today-tip" id="today-tip"><h3>Today Tip</h3></section>
      <section class="milestone" id="milestone-timeline">
        <h3>Milestone Timeline</h3>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
