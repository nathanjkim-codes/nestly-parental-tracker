<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nestly-parental-tracker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <button class="add-btn">Add Child</button>

    <!-- Child Cards Container -->
    <div id="child-list"></div>

    <!-- Dashboard -->
    <main id="dashboard">
      <section class="card" id="child-profile">
        <div class="card-content">
          <h3>Child Profile</h3>
          <p class="child-name">Name: -</p>
          <p class="child-birth">Birth Date: -</p>
          <p class="child-height">Height: -</p>
          <p class="child-weight">Weight: -</p>
          <p class="child-gender">Gender: -</p>
        </div>

        <div class="card-actions">
          <button class="edit-btn">Edit</button>
          <button class="delete-btn">Delete</button>
        </div>
      </section>

      <section class="growth-Chart" id="growth-chart">Growth Chart</section>
      <section class="today-Tip" id="today-tip">Today Tip</section>
      <section class="milestone" id="milestone-timeline">
        Milestone Timeline
      </section>
    </main>

    <script src="js/script.js" defer></script>
  </body>
</html>
